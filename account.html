<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account | Technotronics Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .auth-input { width: 100%; px-4; padding: 1rem; border: 1px solid #e5e7eb; border-radius: 0.125rem; outline: none; transition: all 0.2s; background: #f9fafb; }
        .auth-input:focus { border-color: #000; background: #fff; }
    </style>
</head>
<body class="bg-white text-gray-900">

    <nav class="p-6 border-b border-gray-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black tracking-tighter uppercase">TECHNOTRONICS</a>
            <a href="index.html" class="text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-black">← Back to Site</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-24 flex justify-center">
        
        <div class="bg-gray-50 p-10 md:p-16 rounded-[3rem] w-full max-w-xl shadow-sm border border-gray-100">
            <h2 class="text-3xl font-black uppercase tracking-tighter mb-4 text-center">Customer Login</h2>
            <p class="text-[11px] font-bold uppercase tracking-widest text-gray-400 mb-10 text-center">
                Access your DriveSense V.1 telemetry & diagnostics
            </p>
            
            <form action="#" class="space-y-4">
                <input type="text" placeholder="USERNAME / EMAIL" class="auth-input bg-white text-[10px] font-bold tracking-widest uppercase">
                <input type="password" placeholder="PASSWORD" class="auth-input bg-white text-[10px] font-bold tracking-widest uppercase">
                
                <div class="flex justify-end items-center pt-2">
                    <a href="#" class="text-[10px] font-bold uppercase text-gray-400 hover:text-black tracking-widest transition">Forgot Password?</a>
                </div>
                
                <button type="submit" class="w-full py-5 bg-black text-white font-black uppercase tracking-[0.2em] text-[10px] hover:bg-gray-800 transition-all shadow-xl rounded-md active:scale-95">
                    Login to Dashboard
                </button>
                
                <p class="text-center mt-8 text-[9px] font-black text-gray-300 uppercase tracking-[0.2em]">
                    New User? <a href="#" class="text-black hover:underline">Create Account</a>
                </p>
            </form>
        </div>

    </main>

    <footer class="py-10 text-center text-[10px] font-bold text-gray-300 uppercase tracking-[0.3em]">
        Technotronics Ltd. London HQ © 2026
    </footer>

</body>
</html>
